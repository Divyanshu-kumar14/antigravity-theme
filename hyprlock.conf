# Gruvbox Dark Hard Colors
$color = rgba(29, 32, 33, 1)           # #1d2021 (Background)
$inner_color = rgba(29, 32, 33, 1)     # #1d2021 (Input Inner Box)
$outer_color = rgba(251, 241, 199, 1)  # #fbf1c7 (Input Border & Clock)
$font_color = rgba(168, 153, 132, 1)   # #a89984 (Text / Greeting)
$placeholder_color = rgba(168, 153, 132, 0.7)
$check_color = rgba(250, 189, 47, 1)   # #fabd2f (Yellow - Checking)
$fail_color = rgba(204, 36, 29, 1)     # #cc241d (Red - Failed)

# --- BACKGROUND ---
background {
    monitor =
    # Use one of the optimized wallpapers
    path = ~/.config/omarchy/current/theme/backgrounds/bg-1.jpg
    color = $color

    # Zero blur for low RAM usage
    blur_passes = 0
    blur_size = 0
}

# --- CLOCK ---
label {
    monitor =
    text = $TIME
    color = $outer_color
    font_size = 120
    font_family = JetBrainsMono Nerd Font Bold

    position = 0, 100
    halign = center
    valign = center
    shadow_passes = 0 # No shadows (Low RAM)
}

# --- GREETING ---
label {
    monitor =
    text = Welcome back, $USER!
    color = $font_color
    font_size = 24
    font_family = JetBrainsMono Nerd Font

    position = 0, -15
    halign = center
    valign = center
}

# --- PASSWORD INPUT ---
input-field {
    monitor =
    size = 280, 55
    outline_thickness = 3
    
    dots_size = 0.28   # Size of the password dots
    dots_spacing = 0.3 # Spacing between dots
    dots_center = true

    outer_color = $outer_color
    inner_color = $inner_color
    font_color = $font_color
    
    fade_on_empty = false
    placeholder_text = <span foreground="##a89984">Password...</span>
    hide_input = false
    
    # State Colors
    check_color = $check_color     # Turns Gruvbox Yellow when checking
    fail_color = $fail_color       # Turns Gruvbox Red when failed
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # Shows "Authentication failed (1)"
    
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    
    position = 0, -110
    halign = center
    valign = center
}
