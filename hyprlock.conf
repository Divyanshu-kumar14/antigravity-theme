# Gruvbox Dark Hard Colors
$bg_dark   = rgba(29, 32, 33, 1)        # #1d2021 (Background)
$card_bg   = rgba(40, 40, 40, 0.95)     # #282828 (Card Background)
$border    = rgba(251, 241, 199, 1)     # #fbf1c7 (Input Border)
$text_main = rgba(235, 219, 178, 1)     # #ebdbb2 (Clock / Primary Text)
$text_sub  = rgba(168, 153, 132, 1)     # #a89984 (Greeting / Secondary)
$accent_y  = rgba(250, 189, 47, 1)      # #fabd2f (Yellow - Checking)
$accent_r  = rgba(204, 36, 29, 1)       # #cc241d (Red - Failed)

# --- BACKGROUND ---
background {
    monitor =
    path = ~/.config/omarchy/current/theme/backgrounds/bg-1.jpg
    color = $bg_dark

    # Zero blur for low RAM usage
    blur_passes = 0
    blur_size = 0
}

# --- CARD BACKDROP ---
shape {
    monitor =
    size = 400, 360
    color = $card_bg
    rounding = 20
    border_size = 2
    border_color = rgba(102, 92, 84, 1) # #665c54 Subtle Border

    position = 0, 0
    halign = center
    valign = center
}

# --- CLOCK ---
label {
    monitor =
    text = $TIME
    color = $text_main
    font_size = 80
    font_family = JetBrainsMono Nerd Font Bold

    position = 0, 60
    halign = center
    valign = center
    shadow_passes = 0
}

# --- GREETING ---
label {
    monitor =
    text = Welcome back, $USER!
    color = $text_sub
    font_size = 18
    font_family = JetBrainsMono Nerd Font

    position = 0, -20
    halign = center
    valign = center
}

# --- PASSWORD INPUT ---
input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    
    dots_size = 0.25   
    dots_spacing = 0.3 
    dots_center = true

    outer_color = $border
    inner_color = $bg_dark
    font_color = $text_main
    
    fade_on_empty = false
    placeholder_text = <span foreground="##a89984">Password...</span>
    hide_input = false
    
    # State Colors
    check_color = $accent_y     
    fail_color = $accent_r       
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> 
    
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    
    position = 0, -90
    halign = center
    valign = center
}
