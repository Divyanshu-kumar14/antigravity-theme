# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

$activeBorderColor = rgba(fbf1c7ee) rgba(1d2021ee) 45deg


general {
    col.active_border = $activeBorderColor
    gaps_in = 2
    gaps_out = 3
    border_size = 2
}

group {
    col.border_active = $activeBorderColor
}

decoration {
    rounding = 4
    rounding_power = 3

    shadow {
      enabled = yes
      render_power = 3
      range = 16
      color = rgba(00000052)
    }

    blur {
        enabled = true
        size = 3
        passes = 2
    }
}

# Smooth macOS-style animations
animations {
    enabled = true

    # macOS-inspired curves — long, smooth ease-out with no overshoot
    bezier = macOS, 0.25, 1.0, 0.5, 1.0
    bezier = macOS_gentle, 0.2, 0.9, 0.3, 1.0
    bezier = macOS_swift, 0.15, 0.85, 0.25, 1.0
    bezier = macOS_fade, 0.33, 1.0, 0.68, 1.0
    bezier = macOS_exit, 0.4, 0.0, 0.7, 0.2

    # Window open/close — gentle scale-in, no harsh popin
    animation = windowsIn, 1, 5, macOS, popin 92%
    animation = windowsOut, 1, 5, macOS_exit, popin 92%
    animation = windowsMove, 1, 5, macOS_gentle, slide

    # Border color transitions
    animation = border, 1, 12, macOS_gentle

    # Layers (menus, popups)
    animation = layersIn, 1, 4, macOS, popin 95%
    animation = layersOut, 1, 3, macOS_exit, popin 95%

    # Fade transitions
    animation = fadeIn, 1, 4, macOS_fade
    animation = fadeOut, 1, 4, macOS_fade
    animation = fadeLayersIn, 1, 3, macOS_fade
    animation = fadeLayersOut, 1, 3, macOS_fade
    animation = fadeDim, 1, 4, macOS_fade

    # Workspace swipe — long, fluid slide like macOS Mission Control
    animation = workspaces, 1, 5, macOS, slide

    # Special workspace (dropdown/scratchpad)
    animation = specialWorkspaceIn, 1, 5, macOS, slidevert
    animation = specialWorkspaceOut, 1, 4, macOS_exit, slidevert
}
