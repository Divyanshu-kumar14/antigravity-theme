# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.
# Optimized for low RAM usage.

$activeBorderColor = rgba(fbf1c7ee) rgba(1d2021ee) 45deg

general {
    col.active_border = $activeBorderColor
    gaps_in = 2
    gaps_out = 3
    border_size = 2
}

group {
    col.border_active = $activeBorderColor
}

decoration {
    rounding = 4
    rounding_power = 2

    shadow {
      enabled = no
    }

    blur {
        enabled = false
    }
}

misc {
    vfr = true
    vrr = 0
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
}

# Lean animations — smooth feel, minimal RAM overhead
animations {
    enabled = true

    bezier = smooth, 0.25, 1.0, 0.5, 1.0
    bezier = gentle, 0.2, 0.9, 0.3, 1.0
    bezier = fade, 0.33, 1.0, 0.68, 1.0

    # Window open/close
    animation = windowsIn, 1, 5, smooth, popin 92%
    animation = windowsOut, 1, 5, default, popin 92%
    animation = windowsMove, 1, 5, gentle, slide

    # Border
    animation = border, 1, 12, gentle

    # Layers (menus, popups)
    animation = layers, 1, 4, smooth, popin 95%

    # All fades consolidated
    animation = fade, 1, 4, fade

    # Workspace swipe
    animation = workspaces, 1, 5, smooth, slide
}
