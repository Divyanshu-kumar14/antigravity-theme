; ======================================================
; Antigravity Theme for Spotify — Gruvbox Dark Hard
; Spicetify color.ini
; ======================================================
; Usage:
;   1. Install Spicetify: https://spicetify.app/docs/getting-started
;   2. Copy this file to ~/.config/spicetify/Themes/Antigravity/color.ini
;   3. Copy the companion user.css to the same directory
;   4. Run: spicetify config current_theme Antigravity color_scheme base
;   5. Run: spicetify apply
; ======================================================

[base]
; --- Primary text ---
text                    = fbf1c7
subtext                 = a89984
; --- Main backgrounds ---
main                    = 1d2021
main-elevated           = 282828
main-transition         = 1d2021
; --- Highlight / selection ---
highlight               = 504945
highlight-elevated      = 665c54
; --- Sidebar ---
sidebar                 = 1d2021
sidebar-text            = ebdbb2
; --- Player bar ---
player                  = 1d2021
; --- Card surfaces ---
card                    = 282828
card-elevated           = 3c3836
; --- Shadow ---
shadow                  = 1d2021
; --- Primary and secondary ---
button                  = fabd2f
button-secondary        = 3c3836
button-active           = d79921
button-disabled         = 504945
; --- Tab and top bar ---
tab-active              = fabd2f
; --- Notification ---
notification            = 3c3836
notification-error      = cc241d
; --- Misc ---
misc                    = 928374
; --- Positive / Negative ---
positive                = b8bb26
negative                = fb4934
; --- Playback bar ---
playback-bar            = fabd2f

